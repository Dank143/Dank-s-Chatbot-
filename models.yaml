api_nim:
  base_url: https://integrate.api.nvidia.com/v1
  key: ""

api_ollama:
  base_url: http://localhost:11434/v1
  key: ""

defaults:
  max_tokens: 10000
  max_history_turns: 50
  max_search_urls: 5
  temperature: 0.75
  system_prompt: ""

default_model_nim: openai/gpt-oss-120b
default_model_ollama: gpt-oss:120b-cloud

# There are other models, yet they suffer with major inconsistancies. If you don't mind gambling on their speed, include them here.
